services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4002:4002"
    volumes:
      - .:/app
      - /app/node_modules
      - ./storage:/app/storage
    environment:
      - NODE_ENV=development
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
      - NEO4J_DATABASE=${NEO4J_DATABASE:-neo4j}
      - PORT=4002
      - VALKEY_URI=${VALKEY_URI:-redis://valkey:6379}
      - VALKEY_PASSWORD=${VALKEY_PASSWORD:-}
      - QDRANT_URL=${QDRANT_URL:-http://qdrant:6333}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    depends_on:
      - valkey
      - qdrant
    stdin_open: true
    tty: true

  valkey:
    image: valkey/valkey:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    command: >
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  valkey-data:
  qdrant-data:

