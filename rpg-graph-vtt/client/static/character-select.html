<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Character - RPG Graph VTT</title>
    <style>
        /* Scandinavian Minimalist Design - IKEA meets D&D Beyond */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --color-primary: #0051A5;      /* IKEA Blue */
            --color-primary-dark: #003D7A;
            --color-text: #1A1A1A;
            --color-text-light: #666666;
            --color-border: #E5E5E5;
            --color-bg: #FFFFFF;
            --color-bg-light: #F8F8F8;
            --color-accent: #FFCC00;        /* IKEA Yellow accent */
            --spacing-xs: 8px;
            --spacing-sm: 16px;
            --spacing-md: 24px;
            --spacing-lg: 32px;
            --spacing-xl: 48px;
            --border-radius: 4px;
            --font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        }

        body {
            font-family: var(--font-family);
            background: var(--color-bg);
            color: var(--color-text);
            line-height: 1.6;
            padding: 0;
            margin: 0;
        }

        /* Header */
        .header {
            background: var(--color-bg);
            border-bottom: 1px solid var(--color-border);
            padding: var(--spacing-md) var(--spacing-lg);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 20px;
            font-weight: 600;
            color: var(--color-primary);
            letter-spacing: -0.5px;
        }

        .header-actions {
            display: flex;
            gap: var(--spacing-sm);
        }

        .btn {
            padding: var(--spacing-xs) var(--spacing-md);
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            color: var(--color-text);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            border-radius: var(--border-radius);
            transition: all 0.2s ease;
            text-decoration: none;
            display: inline-block;
        }

        .btn:hover {
            border-color: var(--color-primary);
            color: var(--color-primary);
        }

        .btn-primary {
            background: var(--color-primary);
            color: white;
            border-color: var(--color-primary);
        }

        .btn-primary:hover {
            background: var(--color-primary-dark);
            border-color: var(--color-primary-dark);
        }

        /* Main Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: var(--spacing-xl) var(--spacing-lg);
        }

        /* Page Header */
        .page-header {
            margin-bottom: var(--spacing-xl);
        }

        .page-title {
            font-size: 32px;
            font-weight: 300;
            color: var(--color-text);
            margin-bottom: var(--spacing-xs);
            letter-spacing: -1px;
        }

        .page-subtitle {
            font-size: 16px;
            color: var(--color-text-light);
            font-weight: 400;
        }

        /* Filters */
        .filters {
            display: flex;
            gap: var(--spacing-md);
            margin-bottom: var(--spacing-xl);
            padding-bottom: var(--spacing-lg);
            border-bottom: 1px solid var(--color-border);
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            gap: var(--spacing-xs);
        }

        .filter-label {
            font-size: 12px;
            font-weight: 600;
            color: var(--color-text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .filter-select {
            padding: var(--spacing-xs) var(--spacing-sm);
            border: 1px solid var(--color-border);
            background: var(--color-bg);
            font-size: 14px;
            border-radius: var(--border-radius);
            min-width: 180px;
            cursor: pointer;
        }

        .filter-select:focus {
            outline: none;
            border-color: var(--color-primary);
        }

        /* Character Grid */
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--spacing-lg);
            margin-bottom: var(--spacing-xl);
        }

        /* Character Card - Minimalist Design */
        .character-card {
            background: var(--color-bg);
            border: 1px solid var(--color-border);
            border-radius: var(--border-radius);
            padding: var(--spacing-md);
            transition: all 0.2s ease;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            min-height: 280px;
        }

        .character-card:hover {
            border-color: var(--color-primary);
            box-shadow: 0 2px 8px rgba(0, 81, 165, 0.1);
            transform: translateY(-2px);
        }

        .character-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--spacing-md);
            padding-bottom: var(--spacing-md);
            border-bottom: 1px solid var(--color-border);
        }

        .character-name {
            font-size: 20px;
            font-weight: 600;
            color: var(--color-text);
            margin-bottom: var(--spacing-xs);
            letter-spacing: -0.3px;
        }

        .character-level {
            font-size: 12px;
            color: var(--color-text-light);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .character-class-race {
            font-size: 14px;
            color: var(--color-text-light);
            margin-top: var(--spacing-xs);
        }

        .character-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-sm);
            margin-top: auto;
        }

        .stat-item {
            text-align: center;
            padding: var(--spacing-sm);
            background: var(--color-bg-light);
            border-radius: var(--border-radius);
        }

        .stat-value {
            font-size: 20px;
            font-weight: 600;
            color: var(--color-primary);
            display: block;
            margin-bottom: var(--spacing-xs);
        }

        .stat-label {
            font-size: 11px;
            color: var(--color-text-light);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: var(--spacing-xl) var(--spacing-lg);
            color: var(--color-text-light);
        }

        .empty-state-icon {
            font-size: 48px;
            margin-bottom: var(--spacing-md);
            opacity: 0.3;
        }

        .empty-state-title {
            font-size: 18px;
            font-weight: 500;
            margin-bottom: var(--spacing-xs);
            color: var(--color-text);
        }

        .empty-state-text {
            font-size: 14px;
            margin-bottom: var(--spacing-md);
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: var(--spacing-xl);
            color: var(--color-text-light);
        }

        .spinner {
            border: 2px solid var(--color-border);
            border-top: 2px solid var(--color-primary);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            animation: spin 1s linear infinite;
            margin: 0 auto var(--spacing-md);
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .character-grid {
                grid-template-columns: 1fr;
            }

            .filters {
                flex-direction: column;
            }

            .page-title {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">RPG Graph VTT</div>
            <div class="header-actions">
                <a href="/" class="btn">Dashboard</a>
                <a href="/character-select.html" class="btn btn-primary">Select Character</a>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="page-header">
            <h1 class="page-title">Select Character</h1>
            <p class="page-subtitle">Choose a character to view or edit</p>
        </div>

        <div class="filters">
            <div class="filter-group">
                <label class="filter-label">Party</label>
                <select class="filter-select" id="partyFilter">
                    <option value="">All Parties</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Class</label>
                <select class="filter-select" id="classFilter">
                    <option value="">All Classes</option>
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Level</label>
                <select class="filter-select" id="levelFilter">
                    <option value="">All Levels</option>
                    <option value="1-5">Levels 1-5</option>
                    <option value="6-10">Levels 6-10</option>
                    <option value="11-15">Levels 11-15</option>
                    <option value="16-20">Levels 16-20</option>
                </select>
            </div>
        </div>

        <div id="characterGrid" class="character-grid">
            <div class="loading">
                <div class="spinner"></div>
                <div>Loading characters...</div>
            </div>
        </div>
    </div>

    <script>
        let allCharacters = [];
        let allParties = [];

        // Fetch characters
        async function fetchCharacters() {
            try {
                const response = await fetch('/api/characters');
                if (!response.ok) throw new Error('Failed to fetch characters');
                allCharacters = await response.json();
                renderCharacters(allCharacters);
            } catch (error) {
                console.error('Error fetching characters:', error);
                document.getElementById('characterGrid').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">⚠️</div>
                        <div class="empty-state-title">Error Loading Characters</div>
                        <div class="empty-state-text">${error.message}</div>
                    </div>
                `;
            }
        }

        // Fetch parties
        async function fetchParties() {
            try {
                const response = await fetch('/api/parties');
                if (!response.ok) throw new Error('Failed to fetch parties');
                allParties = await response.json();
                populatePartyFilter();
            } catch (error) {
                console.error('Error fetching parties:', error);
            }
        }

        // Fetch classes for filter
        async function fetchClasses() {
            try {
                const response = await fetch('/api/classes');
                if (!response.ok) throw new Error('Failed to fetch classes');
                const classes = await response.json();
                populateClassFilter(classes);
            } catch (error) {
                console.error('Error fetching classes:', error);
            }
        }

        // Populate class filter
        function populateClassFilter(classes) {
            const classFilter = document.getElementById('classFilter');
            classes.forEach(cls => {
                const option = document.createElement('option');
                option.value = cls.name;
                option.textContent = cls.name;
                classFilter.appendChild(option);
            });
        }

        // Populate party filter
        function populatePartyFilter() {
            const partyFilter = document.getElementById('partyFilter');
            allParties.forEach(party => {
                const option = document.createElement('option');
                option.value = party.name;
                option.textContent = party.name;
                partyFilter.appendChild(option);
            });
        }

        // Render characters
        function renderCharacters(characters) {
            const grid = document.getElementById('characterGrid');
            
            if (characters.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1 / -1;">
                        <div class="empty-state-icon">👤</div>
                        <div class="empty-state-title">No Characters Found</div>
                        <div class="empty-state-text">Create your first character to get started</div>
                        <a href="/" class="btn btn-primary" style="margin-top: 16px;">Create Character</a>
                    </div>
                `;
                return;
            }

            grid.innerHTML = characters.map(char => {
                const classes = char.classes.map(c => c.name).join(', ') || 'Unknown';
                const races = char.races.map(r => r.name).join(', ') || 'Unknown';
                const party = allParties.find(p => 
                    p.characters.some(c => c.uuid === char.uuid)
                );

                return `
                    <div class="character-card" onclick="viewCharacter('${char.uuid}')">
                        <div class="character-header">
                            <div>
                                <div class="character-name">${char.name}</div>
                                <div class="character-level">Level ${char.level}</div>
                                <div class="character-class-race">${classes} • ${races}</div>
                            </div>
                        </div>
                        <div class="character-stats">
                            <div class="stat-item">
                                <span class="stat-value">${char.hit_points}/${char.hit_points_max}</span>
                                <span class="stat-label">HP</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value">${char.armor_class}</span>
                                <span class="stat-label">AC</span>
                            </div>
                            <div class="stat-item">
                                <span class="stat-value">+${char.proficiency_bonus}</span>
                                <span class="stat-label">Prof</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // View character
        function viewCharacter(uuid) {
            window.location.href = `/api/characters/${uuid}`;
        }

        // Filter handlers
        document.getElementById('partyFilter').addEventListener('change', applyFilters);
        document.getElementById('classFilter').addEventListener('change', applyFilters);
        document.getElementById('levelFilter').addEventListener('change', applyFilters);

        function applyFilters() {
            const partyFilter = document.getElementById('partyFilter').value;
            const classFilter = document.getElementById('classFilter').value;
            const levelFilter = document.getElementById('levelFilter').value;

            let filtered = [...allCharacters];

            // Filter by party
            if (partyFilter) {
                const party = allParties.find(p => p.name === partyFilter);
                if (party) {
                    const partyUuids = new Set(party.characters.map(c => c.uuid));
                    filtered = filtered.filter(c => partyUuids.has(c.uuid));
                }
            }

            // Filter by class
            if (classFilter) {
                filtered = filtered.filter(c => 
                    c.classes.some(cl => cl.name === classFilter)
                );
            }

            // Filter by level
            if (levelFilter) {
                const [min, max] = levelFilter.split('-').map(Number);
                filtered = filtered.filter(c => c.level >= min && c.level <= max);
            }

            renderCharacters(filtered);
        }

        // Initialize
        fetchParties();
        fetchClasses();
        fetchCharacters();
    </script>
</body>
</html>
