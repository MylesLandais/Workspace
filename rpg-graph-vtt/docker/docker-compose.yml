version: '3.8'

services:
  rpg-graph-vtt:
    build:
      context: ../..
      dockerfile: rpg-graph-vtt/docker/Dockerfile
    container_name: rpg-graph-vtt
    ports:
      - "8000:8000"
    environment:
      - NEO4J_URI=${NEO4J_URI:-neo4j+s://localhost:7687}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD}
    env_file:
      - .env
    volumes:
      # Mount database migrations and seeds for initialization
      - ../rpg-graph-vtt/database:/app/database:ro
      # Mount notebooks for development (optional)
      - ../rpg-graph-vtt/notebooks:/app/notebooks:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/characters"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - rpg-network

  # Optional: Neo4j instance for local development/testing
  neo4j:
    image: neo4j:5-community
    container_name: rpg-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:-changeme}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - rpg-network
    profiles:
      - local-db  # Only start with --profile local-db

networks:
  rpg-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:

