<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery - Catalogue Viewer</title>
    <link rel="stylesheet" href="/gallery/styles/main.css">
</head>
<body>
    <div id="app">
        <header class="gallery-header">
            <div class="header-content">
                <h1 class="gallery-title">Gallery</h1>
                <div class="header-controls">
                    <div class="search-container">
                        <input 
                            type="text" 
                            id="search-input" 
                            placeholder="Search..."
                            class="search-input"
                        >
                        <button id="search-btn" class="btn btn-primary">Search</button>
                    </div>
                    <div class="view-controls">
                        <button id="grid-view-btn" class="view-btn active" title="Grid view">
                            <svg width="20" height="20" viewBox="0 0 20 20">
                                <rect x="2" y="2" width="7" height="7" fill="currentColor"/>
                                <rect x="11" y="2" width="7" height="7" fill="currentColor"/>
                                <rect x="2" y="11" width="7" height="7" fill="currentColor"/>
                                <rect x="11" y="11" width="7" height="7" fill="currentColor"/>
                            </svg>
                        </button>
                        <button id="list-view-btn" class="view-btn" title="List view">
                            <svg width="20" height="20" viewBox="0 0 20 20">
                                <rect x="2" y="3" width="16" height="2" fill="currentColor"/>
                                <rect x="2" y="9" width="16" height="2" fill="currentColor"/>
                                <rect x="2" y="15" width="16" height="2" fill="currentColor"/>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <div class="gallery-layout">
            <aside class="gallery-sidebar">
                <div class="sidebar-section">
                    <h3 class="sidebar-title">Sources</h3>
                    <ul id="sources-list" class="sources-list">
                        <li class="loading">Loading sources...</li>
                    </ul>
                </div>
                
                <div class="sidebar-section">
                    <h3 class="sidebar-title">Sort</h3>
                    <select id="sort-select" class="sort-select">
                        <option value="new">New</option>
                        <option value="top">Top</option>
                        <option value="controversial">Controversial</option>
                    </select>
                </div>
                
                <div class="sidebar-section">
                    <h3 class="sidebar-title">Filters</h3>
                    <label class="filter-label">
                        <input type="checkbox" id="nsfw-filter">
                        Show NSFW
                    </label>
                    <label class="filter-label">
                        <input type="checkbox" id="cached-filter" checked>
                        Cached only
                    </label>
                </div>
            </aside>

            <main class="gallery-main">
                <div id="catalogue-container" class="catalogue-grid">
                    <div class="loading">Loading catalogue...</div>
                </div>
                
                <div id="pagination" class="pagination">
                    <button id="prev-btn" class="btn btn-secondary" disabled>Previous</button>
                    <span id="page-info" class="page-info">Page 1</span>
                    <button id="next-btn" class="btn btn-secondary">Next</button>
                </div>
            </main>
        </div>

        <div id="html-viewer-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2 id="modal-title">HTML Viewer</h2>
                    <button id="close-modal" class="btn-close">&times;</button>
                </div>
                <div id="html-viewer-content" class="modal-body">
                    <iframe id="html-frame" class="html-frame"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="/gallery/scripts/main.js"></script>
</body>
</html>
