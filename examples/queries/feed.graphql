# Feed Queries for Bunny GraphQL API
# These queries fetch paginated media from your subscribed sources

# Main feed query with cursor pagination
query Feed($cursor: String, $limit: Int, $filters: FeedFilters) {
  feed(cursor: $cursor, limit: $limit, filters: $filters) {
    edges {
      cursor
      node {
        id
        title
        sourceUrl
        publishDate
        imageUrl
        presignedUrl
        urlExpiresAt
        mediaType
        platform
        width
        height
        score
        handle {
          name
          handle
          creatorName
        }
        subreddit {
          name
          displayName
          subscriberCount
        }
        author {
          username
          karma
        }
        sha256
        phash
        dhash
        mimeType
        storagePath
        sizeBytes
        cluster {
          id
          repostCount
        }
        isDuplicate
        isRepost
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

# Minimal feed query (lighter payload)
query FeedMinimal($cursor: String, $limit: Int, $filters: FeedFilters) {
  feed(cursor: $cursor, limit: $limit, filters: $filters) {
    edges {
      cursor
      node {
        id
        title
        presignedUrl
        imageUrl
        width
        height
        score
        mediaType
        platform
        handle {
          handle
        }
      }
    }
    pageInfo {
      hasNextPage
      endCursor
    }
  }
}

# Filter input type reference
# input FeedFilters {
#   persons: [String!]!    # Filter by creator/entity names
#   sources: [String!]!    # Filter by source names (e.g., "r/unixporn")
#   tags: [String!]!       # Filter by content tags
#   searchQuery: String!   # Full-text search in titles
#   categories: [String!]! # Filter by media type: "IMAGE", "VIDEO", "GIF"
# }

# Example usage:
#
# // Filter by subreddit
# {
#   "cursor": null,
#   "limit": 20,
#   "filters": {
#     "persons": [],
#     "sources": ["r/unixporn", "r/mechanicalkeyboards"],
#     "tags": [],
#     "searchQuery": "",
#     "categories": []
#   }
# }
#
# // Search with category filter
# {
#   "cursor": null,
#   "limit": 20,
#   "filters": {
#     "persons": [],
#     "sources": [],
#     "tags": [],
#     "searchQuery": "hyprland",
#     "categories": ["IMAGE"]
#   }
# }
#
# // Pagination (load more)
# {
#   "cursor": "2024-01-15T10:30:00.000Z",
#   "limit": 20,
#   "filters": { ... }
# }
