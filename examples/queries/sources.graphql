# Source Management Queries and Mutations
# Sources define what content appears in your feed

# List all sources with optional filtering
query GetUserSources($filters: SourceFiltersInput) {
  getUserSources(filters: $filters) {
    id
    name
    sourceType
    subredditName
    youtubeHandle
    twitterHandle
    instagramHandle
    tiktokHandle
    url
    rssUrl
    iconUrl
    description
    entityId
    entityName
    group
    groupId
    tags
    isPaused
    isEnabled
    isActive
    lastSynced
    mediaCount
    storiesPerMonth
    readsPerMonth
    health
  }
}

# Get single source by ID
query GetSourceById($id: ID!) {
  getSourceById(id: $id) {
    id
    name
    sourceType
    subredditName
    youtubeHandle
    twitterHandle
    instagramHandle
    tiktokHandle
    url
    rssUrl
    iconUrl
    description
    entityId
    entityName
    group
    groupId
    tags
    isPaused
    isEnabled
    isActive
    lastSynced
    mediaCount
    storiesPerMonth
    readsPerMonth
    health
  }
}

# List feed groups
query GetFeedGroups {
  getFeedGroups {
    id
    name
    createdAt
  }
}

# Search subreddits
query SearchSubreddits($query: String!) {
  searchSubreddits(query: $query) {
    name
    displayName
    subscriberCount
    description
    iconUrl
    isSubscribed
  }
}

# Create a new source
mutation CreateSource($input: CreateSourceInput!) {
  createSource(input: $input) {
    id
    name
    sourceType
    subredditName
    youtubeHandle
    twitterHandle
    instagramHandle
    tiktokHandle
    url
    rssUrl
    isPaused
    isEnabled
  }
}

# Update existing source
mutation UpdateSource($id: ID!, $input: UpdateSourceInput!) {
  updateSource(id: $id, input: $input) {
    id
    name
    description
    groupId
    isPaused
    isEnabled
  }
}

# Delete source
mutation DeleteSource($id: ID!) {
  deleteSource(id: $id)
}

# Bulk delete sources
mutation BulkDeleteSources($ids: [ID!]!) {
  bulkDeleteSources(ids: $ids)
}

# Toggle pause state
mutation ToggleSourcePause($id: ID!) {
  toggleSourcePause(id: $id) {
    id
    isPaused
  }
}

# Quick subscribe to subreddit
mutation SubscribeToSource($subredditName: String!, $groupId: String) {
  subscribeToSource(subredditName: $subredditName, groupId: $groupId) {
    id
    name
    subredditName
  }
}

# Create feed group
mutation CreateFeedGroup($name: String!) {
  createFeedGroup(name: $name) {
    id
    name
    createdAt
  }
}

# Import RSS feeds from OPML
mutation ImportOPML($feedUrls: [String!]!, $groupId: String) {
  importOPML(feedUrls: $feedUrls, groupId: $groupId) {
    imported
    skipped
    failed
    sources {
      id
      name
      rssUrl
    }
    errors
  }
}

