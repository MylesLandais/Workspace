services:
  kino:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kino.dev.local
    hostname: kino.dev.local
    volumes:
      - ..:/workspace:cached
    command: /workspace/dnd_app/start_container.sh
    # depends_on:
    #   - neo4j
    ports:
      - "4000:4000"
    environment:
      - MIX_ENV=dev
      - NEO4J_URL=bolt://172.17.0.4:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    network_mode: bridge
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # Using existing neo4j container instead of creating a new one
  # If you want a separate neo4j, uncomment below and change ports
