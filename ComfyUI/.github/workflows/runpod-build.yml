name: RunPod Build and Deploy

#
# This workflow validates Dockerfile.runpod and creates GitHub releases to trigger
# RunPod serverless rebuilds. RunPod watches for releases (not commits) to rebuild.
#
# Flow: Push -> Validate -> Create Release -> RunPod auto-rebuilds from release
#

on:
  push:
    branches:
      - feature/runpod-worker
    paths:
      - 'Dockerfile.runpod'
      - 'src/**'
      - 'scripts/comfy-node-install.sh'
      - 'scripts/comfy-manager-set-mode.sh'
      - 'handler.py'
  pull_request:
    branches:
      - feature/runpod-worker
    paths:
      - 'Dockerfile.runpod'
      - 'src/**'
      - 'scripts/comfy-node-install.sh'
      - 'scripts/comfy-manager-set-mode.sh'
      - 'handler.py'
  workflow_dispatch:
    inputs:
      skip_release:
        description: 'Skip release creation (validate only)'
        required: false
        default: 'false'
        type: boolean

jobs:
  validate-dockerfile:
    name: Validate Dockerfile.runpod
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Dockerfile syntax
        run: |
          if ! command -v hadolint &> /dev/null; then
            echo "Installing hadolint..."
            wget -O /tmp/hadolint https://github.com/hadolint/hadolint/releases/latest/download/hadolint-Linux-x86_64
            chmod +x /tmp/hadolint
            sudo mv /tmp/hadolint /usr/local/bin/hadolint
          fi
          hadolint Dockerfile.runpod || true

      - name: Check Dockerfile exists
        run: |
          if [ ! -f Dockerfile.runpod ]; then
            echo "Error: Dockerfile.runpod not found"
            exit 1
          fi
          echo "Dockerfile.runpod found"

      - name: Validate required files exist
        run: |
          required_files=(
            "handler.py"
            "src/start.sh"
            "src/extra_model_paths.yaml"
            "scripts/comfy-node-install.sh"
            "scripts/comfy-manager-set-mode.sh"
          )
          missing_files=()
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              missing_files+=("$file")
            fi
          done
          if [ ${#missing_files[@]} -ne 0 ]; then
            echo "Error: Missing required files:"
            printf '  - %s\n' "${missing_files[@]}"
            exit 1
          fi
          echo "All required files present"

  build-status:
    name: Check RunPod Build Status
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/feature/runpod-worker'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Check RunPod endpoint status
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ENDPOINT_ID: ${{ secrets.RUNPOD_ENDPOINT_ID }}
        run: |
          if [ -z "$RUNPOD_API_KEY" ] || [ -z "$RUNPOD_ENDPOINT_ID" ]; then
            echo "Skipping RunPod status check (secrets not configured)"
            exit 0
          fi
          
          python scripts/runpod_monitor.py status || echo "Status check completed"

      - name: Comment PR with build info
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ENDPOINT_ID: ${{ secrets.RUNPOD_ENDPOINT_ID }}
        with:
          script: |
            if (process.env.RUNPOD_API_KEY && process.env.RUNPOD_ENDPOINT_ID) {
              github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: 'RunPod build validation completed. Check RunPod dashboard for build status.'
              });
            }

  create-release:
    name: Create Release (Triggers RunPod Build)
    runs-on: ubuntu-latest
    needs: validate-dockerfile
    if: |
      github.event_name == 'push' && 
      github.ref == 'refs/heads/feature/runpod-worker' &&
      (github.event_name != 'workflow_dispatch' || github.event.inputs.skip_release != 'true')
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate release tag
        id: tag
        run: |
          # Format: runpod-YYYYMMDD-HHMMSS
          TAG="runpod-$(date -u +'%Y%m%d-%H%M%S')"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "Generated tag: $TAG"

      - name: Get commit info
        id: commit
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "message<<EOF" >> $GITHUB_OUTPUT
          git log -1 --pretty=%B >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "RunPod Build - ${{ steps.tag.outputs.tag }}"
          body: |
            Automated RunPod deployment release.
            
            **Commit:** ${{ steps.commit.outputs.sha_short }}
            **Branch:** feature/runpod-worker
            
            **Changes:**
            ${{ steps.commit.outputs.message }}
            
            ---
            This release triggers RunPod to rebuild the serverless endpoint.
          draft: false
          prerelease: false
          target_commitish: feature/runpod-worker
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Release created
        run: |
          echo "=============================================="
          echo "Release ${{ steps.tag.outputs.tag }} created!"
          echo "RunPod will now automatically rebuild."
          echo "Monitor at: https://www.runpod.io/console/serverless"
          echo "=============================================="

  monitor-build:
    name: Monitor Build and Detect Failures
    runs-on: ubuntu-latest
    needs: create-release
    if: |
      github.event_name == 'push' && 
      github.ref == 'refs/heads/feature/runpod-worker'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Wait for build to start
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ENDPOINT_ID: ${{ secrets.RUNPOD_ENDPOINT_ID }}
        run: |
          if [ -z "$RUNPOD_API_KEY" ] || [ -z "$RUNPOD_ENDPOINT_ID" ]; then
            echo "Skipping build monitoring (secrets not configured)"
            exit 0
          fi
          
          echo "Waiting 5 minutes for build to start..."
          sleep 300
          
          echo "Checking build status..."
          python scripts/runpod_monitor.py status || echo "Status check completed"

      - name: Check for build completion
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ENDPOINT_ID: ${{ secrets.RUNPOD_ENDPOINT_ID }}
        run: |
          if [ -z "$RUNPOD_API_KEY" ] || [ -z "$RUNPOD_ENDPOINT_ID" ]; then
            echo "Skipping build completion check (secrets not configured)"
            exit 0
          fi
          
          echo "Waiting for build to complete (timeout: 40 minutes)..."
          python scripts/runpod_monitor.py wait || echo "Build monitoring completed"

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@v6
        env:
          RUNPOD_API_KEY: ${{ secrets.RUNPOD_API_KEY }}
          RUNPOD_ENDPOINT_ID: ${{ secrets.RUNPOD_ENDPOINT_ID }}
        with:
          script: |
            const title = `RunPod Build Failure - ${context.sha.substring(0, 7)}`;
            const body = `## RunPod Build Failure Detected
            
            **Commit:** ${context.sha.substring(0, 7)}
            **Branch:** ${context.ref.replace('refs/heads/', '')}
            **Workflow:** ${context.workflow}
            **Run:** ${context.runId}
            
            ### Possible Causes
            
            This may indicate a RISK-001 (Registry Push Failure) issue. Common symptoms:
            - Build completes successfully but deployment fails
            - Layer locking errors during export
            - Registry push errors
            
            ### Actions
            
            1. Check RunPod console for build logs: https://www.runpod.io/console/serverless
            2. Analyze build logs using: \`python scripts/runpod_monitor.py analyze <log-file>\`
            3. If RISK-001 detected, use retry script: \`python scripts/runpod_retry.py <log-file>\`
            4. See troubleshooting guide: \`RUNPOD_TROUBLESHOOTING.md\`
            
            ### Related Documentation
            
            - Risk Registry: \`RISK_REGISTRY.md\`
            - Troubleshooting: \`RUNPOD_TROUBLESHOOTING.md\`
            `;
            
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['runpod', 'build-failure', 'automated']
            });
