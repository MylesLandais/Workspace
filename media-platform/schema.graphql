type YouTubeVideo implements Node {
  id: ID!
  title: String!
  url: String!
  description: String
  duration: Float
  viewCount: Int
  s3Key: String!
  s3Bucket: String!
  contentType: String!
  createdAt: DateTime!
  updatedAt: DateTime!
}

type YouTubeChannel implements Node {
  id: ID!
  handle: String!
  url: String!
  videos(first: Int = 10, after: String): YouTubeVideoConnection!
}

type YouTubeVideoConnection {
  edges: [YouTubeVideoEdge!]!
  pageInfo: PageInfo!
}

type YouTubeVideoEdge {
  node: YouTubeVideo!
  cursor: String!
}

type PageInfo {
  hasNextPage: Boolean!
  hasPreviousPage: Boolean!
  startCursor: String
  endCursor: String
}

type MediaSignedUrl {
  url: String!
  expiresAt: DateTime!
}

type Query {
  # YouTube videos
  youtubeVideo(id: ID!): YouTubeVideo
  youtubeVideos(first: Int = 10, after: String): YouTubeVideoConnection!
  youtubeChannel(handle: String!): YouTubeChannel
  youtubeChannels: [YouTubeChannel!]!

  # Media playback URLs
  mediaSignedUrl(videoId: ID!): MediaSignedUrl
  allVideos(first: Int = 20, after: String): YouTubeVideoConnection!
}

type Mutation {
  # Video ingestion
  ingestYouTubeVideo(videoId: ID!): YouTubeVideo
  refreshYouTubeFeed(channelHandle: String!): YouTubeChannel!
}
