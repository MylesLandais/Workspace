version: '3.8'

services:
  youtube-enhanced-api:
    build: .
    container_name: yt-api.jupyter.dev.local
    hostname: yt-api.jupyter.dev.local
    networks:
      jupyter-dev:
        aliases:
          - yt-api.jupyter.dev.local
    ports:
      - "8001:8001"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=localpassword
      - REDIS_URL=redis://valkey:6379
    depends_on:
      neo4j:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  youtube-polling-worker:
    build: .
    container_name: yt-worker.jupyter.dev.local
    hostname: yt-worker.jupyter.dev.local
    networks:
      jupyter-dev:
        aliases:
          - yt-worker.jupyter.dev.local
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USERNAME=neo4j
      - NEO4J_PASSWORD=localpassword
      - REDIS_URL=redis://valkey:6379
      - POLL_INTERVAL_MINUTES=60
    depends_on:
      neo4j:
        condition: service_healthy
      valkey:
        condition: service_healthy
    restart: unless-stopped
    command: python3 -m media-platform.youtube_polling_worker

networks:
  jupyter-dev:
    external: true
