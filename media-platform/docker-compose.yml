services:
  # Valkey - In-memory cache
  valkey:
    image: valkey/valkey:8.0
    container_name: local-valkey
    ports:
      - "6379:6379"
    environment:
      # Development: no password, no persistence
      VALKEY_ARGS: >-
        --maxmemory 512mb
        --maxmemory-policy allkeys-lru
        --save ""
        --appendonly no
    volumes:
      - valkey_data:/data
    command: >
      valkey-server
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save ""
      --appendonly no
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    networks:
      - dev-network

  # Neo4j - Graph database
  neo4j:
    image: neo4j:5-community
    container_name: local-neo4j
    ports:
      - "7475:7474"
      - "7688:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-localpassword}
      NEO4J_ACCEPT_LICENSE_AGREEMENT: "yes"
      NEO4J_dbms_memory_pagecache_size: 512M
      NEO4J_dbms_memory_heap_initial__size: 512M
      NEO4J_dbms_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
      - ./neo4j-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD:-localpassword} 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5
    depends_on:
      valkey:
        condition: service_healthy
    networks:
      - dev-network

  # MinIO - S3-compatible object storage
  minio:
    image: quay.io/minio/minio
    container_name: local-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - dev-network

  # MinIO bucket initialization
  createbuckets:
    image: quay.io/minio/mc
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ROOT_USER:-minioadmin} ${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb local/${S3_BUCKET_NAME:-media} --ignore-existing;
      mc anonymous set download local/${S3_BUCKET_NAME:-media};
      echo 'Bucket setup complete';
      "
    networks:
      - dev-network

volumes:
  valkey_data:
    driver: local
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  neo4j_plugins:
    driver: local
  minio_data:
    driver: local

networks:
  dev-network:
    name: dev-network
    driver: bridge

