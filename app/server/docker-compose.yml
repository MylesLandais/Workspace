services:
  server:
    image: oven/bun:1.1-slim
    ports:
      - "4002:4002"
    volumes:
      - .:/app
      - /app/node_modules
      - ./storage:/app/storage
    env_file:
      - /home/warby/Workspace/Bunny/.env
    environment:
      - NODE_ENV=development
      - PORT=4002
      - VALKEY_URI=redis://valkey:6379
      - REDIS_URL=redis://valkey:6379
      - QDRANT_URL=http://qdrant:6333
    extra_hosts:
      - "host.docker.internal:host-gateway"
    working_dir: /app
    command: sh -c "bun install && bun run dev"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:4002/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    depends_on:
      valkey:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    stdin_open: true
    tty: true

  valkey:
    image: valkey/valkey:7.2-alpine
    ports:
      - "6380:6379"
    volumes:
      - valkey-data:/data
    command: >
      --maxmemory 4gb
      --maxmemory-policy allkeys-lru
      --save 60 1000
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6335:6333"
      - "6336:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  valkey-data:
  qdrant-data:

