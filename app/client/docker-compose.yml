# E2E Testing environment
# Backing services should be started via root docker-compose.yml first
#
# Run E2E tests: docker compose run --rm e2e-runner

services:
  client:
    build: .
    container_name: bunny-client-test
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=test
      - NEXT_TELEMETRY_DISABLED=1
      - HOSTNAME=0.0.0.0
      # Connect to shared backing services via host network
      - MYSQL_HOST=host.docker.internal
      - MYSQL_PORT=3306
      - MYSQL_USER=bunny
      - MYSQL_PASSWORD=password
      - MYSQL_DATABASE=bunny_auth
      - REDIS_URL=redis://host.docker.internal:6379
    extra_hosts:
      - "host.docker.internal:host-gateway"
    stdin_open: true
    tty: true
    command: ["bun", "run", "dev", "--hostname", "0.0.0.0"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  browserless:
    image: browserless/chrome:latest
    container_name: bunny-browserless
    ports:
      - "3001:3000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/json/version"]
      interval: 10s
      timeout: 5s
      retries: 5

  e2e-runner:
    image: mcr.microsoft.com/playwright:v1.48.1-jammy
    container_name: bunny-e2e
    volumes:
      - .:/app
    working_dir: /app
    environment:
      - PLAYWRIGHT_SERVICE_URL=ws://browserless:3000
      - NEXT_TELEMETRY_DISABLED=1
      - NODE_ENV=test
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      client:
        condition: service_healthy
      browserless:
        condition: service_healthy
    command: ["npx", "playwright", "test"]
