# Character Identity Templates
# Core identities that can be referenced in prompts via {{ character.identity }}

shay:
  id: "shay"
  name: "Shay"
  base_identity: |
    A realistic photograph of Shay, a woman with: oval face, balanced proportions, defined but soft jawline, slightly rounded chin; fair skin tone (Fitzpatrick Type II), warm peachy undertones, light freckles concentrated on nose and upper cheeks; medium-sized eyes, warm brown/hazel color, almond shape, slight upward cant at outer corners; medium thickness eyebrows, dark brown, natural shape with gentle arch; straight nose bridge, medium width, slightly rounded tip; medium-full lips, natural pink tone; dark brown hair (#3B2820 hex), natural shine; long hair extending to mid-chest, straight with slight natural body, fine to medium strand thickness, clean center part.

  # Hairstyle variations
  hairstyles:
    high_ponytail: "sleek high ponytail secured at the crown, pulled tightly back with smooth finish"
    low_ponytail: "sleek low ponytail secured at nape of neck, sides brushed smooth and tight against scalp"
    high_bun: "hair secured in a high messy bun at crown, loose tendrils framing face naturally"
    down_natural: "hair worn down naturally, flowing freely with slight natural body and shine"
    claw_clip_half_up: "half-up style secured with oversized black claw clip positioned horizontally at upper crown, gathering top section while lower half flows freely"
    low_ponytail_flowing: "soft low ponytail at nape, naturally flowing with relaxed styling"

  # Skin/tone descriptors
  skin_descriptors:
    - "fair skin with warm peachy undertones"
    - "light natural freckles concentrated on nose and upper cheeks"
    - "smooth natural texture, no makeup or subtle natural makeup"

  # Eye descriptors
  eye_descriptors:
    - "warm brown/hazel eyes with slight upward cant"
    - "natural eyelashes, almond-shaped eyes"
