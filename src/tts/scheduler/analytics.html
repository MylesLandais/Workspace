<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Imageboard Analytics - Most Reposted Images</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
        }

        .stat-label {
            font-size: 0.9em;
            color: #666;
            margin-bottom: 10px;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            color: #667eea;
        }

        .stat-value.highlight {
            color: #28a745;
        }

        .charts-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .chart-card {
            background: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .chart-card h2 {
            margin-bottom: 15px;
            color: #333;
        }

        .images-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            color: #333;
        }

        .sort-buttons {
            display: flex;
            gap: 10px;
        }

        .sort-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 5px;
            background: #667eea;
            color: white;
            cursor: pointer;
            transition: background 0.3s;
        }

        .sort-btn:hover {
            background: #5568d3;
        }

        .sort-btn.active {
            background: #28a745;
        }

        .images-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .image-card {
            background: #f8f9fa;
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.3s;
        }

        .image-card:hover {
            transform: scale(1.02);
        }

        .image-wrapper {
            position: relative;
            padding-top: 75%;
            overflow: hidden;
            background: #ddd;
        }

        .image-wrapper img {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-info {
            padding: 15px;
        }

        .repost-count {
            font-size: 1.5em;
            font-weight: bold;
            color: #28a745;
            margin-bottom: 5px;
        }

        .image-details {
            font-size: 0.9em;
            color: #666;
        }

        .space-saved {
            color: #dc3545;
            font-weight: 500;
        }

        .first-thread {
            color: #667eea;
            font-size: 0.85em;
        }

        .footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            padding: 20px;
        }
    </style>
</head>

    <div class="container">

        <div class="charts-container">

            <div class="chart-card">

        </div>

        <div class="images-section">

                    <button class="sort-btn" onclick="sortImages('saved')">By Space Saved</button>

            </div>
            <div class="images-grid" id="imagesGrid"></div>
        </div>

        <div class="footer">
            <p>Generated by Imageboard Offline Tool • Deduplication Analysis</p>
        </div>
    </div>

        // Format numbers
        function formatNumber(num) {
            return num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",");
        }

        function formatSize(bytes) {
            if (bytes >= 1024 ** 3) {
                return (bytes / (1024 ** 3)).toFixed(2) + " GB";
            } else if (bytes >= 1024 ** 2) {
                return (bytes / (1024 ** 2)).toFixed(2) + " MB";
            } else if (bytes >= 1024) {
                return (bytes / 1024).toFixed(2) + " KB";
            }
            return bytes + " B";
        }

        // Update stats
        document.getElementById('totalReferences').textContent = formatNumber(analyticsData.total_references);
        document.getElementById('uniqueImages').textContent = formatNumber(analyticsData.unique_images);
        document.getElementById('duplicatesPrevented').textContent = formatNumber(analyticsData.duplicates_prevented);
        document.getElementById('storageUsed').textContent = formatSize(analyticsData.total_storage_gb * 1024 ** 3);
        document.getElementById('spaceSaved').textContent = formatSize(analyticsData.space_saved_gb * 1024 ** 3);
        document.getElementById('threadsCrawled').textContent = formatNumber(analyticsData.threads_crawled);

        // Reuse distribution chart
        const reuseCtx = document.getElementById('reuseChart').getContext('2d');
        const reuseLabels = Object.keys(analyticsData.reuse_distribution).sort((a, b) => a - b);
        const reuseValues = reuseLabels.map(k => analyticsData.reuse_distribution[k]);

        new Chart(reuseCtx, {
            type: 'bar',
            data: {
                labels: reuseLabels.map(l => l + ' use' + (l > 1 ? 's' : '')),
                datasets: [{
                    label: 'Number of Images',
                    data: reuseValues,
                    backgroundColor: 'rgba(102, 126, 234, 0.8)',
                    borderColor: 'rgba(102, 126, 234, 1)',
                    borderWidth: 1
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                scales: {
                    y: {
                        beginAtZero: true,
                        title: {
                            display: true,
                            text: 'Count'
                        }
                    },
                    x: {
                        title: {
                            display: true,
                            text: 'Times Reused'
                        }
                    }
                }
            }
        });

        // Storage analysis chart
        const storageCtx = document.getElementById('storageChart').getContext('2d');
        new Chart(storageCtx, {
            type: 'doughnut',
            data: {
                labels: ['Unique Storage', 'Space Saved'],
                datasets: [{
                    data: [
                        analyticsData.total_storage_gb,
                        analyticsData.space_saved_gb
                    ],
                    backgroundColor: [
                        'rgba(102, 126, 234, 0.8)',
                        'rgba(40, 167, 69, 0.8)'
                    ],
                    borderColor: [
                        'rgba(102, 126, 234, 1)',
                        'rgba(40, 167, 69, 1)'
                    ],
                    borderWidth: 2
                }]
            },
            options: {
                responsive: true,
                plugins: {
                    legend: {
                        position: 'bottom'
                    },
                    tooltip: {
                        callbacks: {
                            label: function(context) {
                                return context.label + ': ' + context.parsed.toFixed(2) + ' GB';
                            }
                        }
                    }
                }
            }
        });

        // Images grid
        let currentSort = 'count';
        let images = [...analyticsData.top_reposted];

        function sortImages(sortBy) {
            currentSort = sortBy;
            
            // Update active button
            document.querySelectorAll('.sort-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');

            // Sort images
            switch(sortBy) {
                case 'count':
                    images.sort((a, b) => b.count - a.count);
                    break;
                case 'size':
                    images.sort((a, b) => b.size_bytes - a.size_bytes);
                    break;
                case 'saved':
                    images.sort((a, b) => b.space_saved_mb - a.space_saved_mb);
                    break;
            }

            renderImages();
        }

        function renderImages() {
            const grid = document.getElementById('imagesGrid');
            grid.innerHTML = '';

            images.forEach(img => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <div class="image-wrapper">
                        <img src="/static/images/${img.filename}" alt="Reposted image" loading="lazy">
                    </div>
                    <div class="image-info">
                        <div class="repost-count">🔄 ${img.count} reposts</div>
                        <div class="image-details">
                            <div>📁 ${img.size_mb.toFixed(2)} MB</div>
                            <div class="space-saved">💾 ${img.space_saved_mb.toFixed(2)} MB saved</div>
                            <div class="first-thread">📌 Thread: ${img.first_thread}</div>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
