version: '3.8'

services:
  web-backend:
    build:
      context: ./src/web_server
      dockerfile: Dockerfile
    container_name: kuroba_web_backend
    ports:
      - "8003:8000" # CHANGED from 8002 to resolve final port conflict
    volumes:
      - .:/home/warby/Workspace/jupyter
      - ./cache:/home/warby/Workspace/jupyter/cache
    environment:
      - REDIS_URL=redis://valkey:6379 
      - CACHE_DIR=/home/warby/Workspace/jupyter/cache/imageboard
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  web-client:
    build:
      context: ./web-client
      dockerfile: Dockerfile
    container_name: kuroba_web_client
    ports:
      - "8081:3000" # External 8081 -> Internal 3000
    volumes:
      - ./web-client:/app
      - /app/node_modules
    command: bun run dev -- --host 0.0.0.0
