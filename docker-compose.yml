# Bunny local services
# MySQL and Neo4j are managed by the data engineering/MLOps team.
# Valkey and MinIO run here on the same shared network.
#
# Shared services (external):
#   - MySQL: mysql-scheduler.jupyter.dev.local:3307
#   - Neo4j: n4j.jupyter.dev.local:7474/7687
#
# Local services (this file):
#   - Valkey: cache.jupyter.dev.local:6379
#   - MinIO: s3.jupyter.dev.local:9000/9001

services:
  valkey:
    image: valkey/valkey:7.2
    container_name: cache.jupyter.dev.local
    ports:
      - "6379:6379"
    volumes:
      - valkey-data:/data
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      jupyter-dev:
        aliases:
          - cache.jupyter.dev.local
          - valkey

  minio:
    image: minio/minio:latest
    container_name: s3.jupyter.dev.local
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped
    networks:
      jupyter-dev:
        aliases:
          - s3.jupyter.dev.local
          - minio

volumes:
  valkey-data:
  minio-data:

networks:
  jupyter-dev:
    name: jupyter_jupyter-dev
    external: true
