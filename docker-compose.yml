services:
  jupyterlab:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - .:/home/jovyan/workspaces
      - ~/downloads/ytdlp:/home/jovyan/downloads/ytdlp
      - ~/assets:/home/jovyan/assets:ro  # Read-only mount for compliance - untrusted code runs in container
      - ~/assets/output:/home/jovyan/assets/output  # Writable outputs in persistent shared space
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "8888:8888"
      - "8000:8000"  # RPG Graph VTT web server
    depends_on:
      - pgvector
    env_file:
      - .env
    # GPU support - using CDI (Container Device Interface) standard for NixOS
    # Note: For docker run, use: --device nvidia.com/gpu=all
    # For docker-compose, we use CDI driver with full device ID
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids: ['nvidia.com/gpu=all']
              capabilities: [gpu]

  pgvector:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=jupyter-dev
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password  # Move to .env for production
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Optional heavy GPU service for vllm builds. Disabled by default; enable with
  # `docker compose --profile vllm up --build vllm` when you want to build/run vllm.
  vllm:
    profiles: ["vllm"]
    build:
      context: .
      dockerfile: Dockerfile.vllm
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids: ['nvidia.com/gpu=all']
              capabilities: [gpu]

volumes:
  postgres_data: {}
