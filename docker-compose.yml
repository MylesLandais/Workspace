# Local Development Stack for Jupyter Project
# All services accessible via localhost with dedicated ports
#
# Usage:
#   docker compose up -d
#
# Service Access:
#   Jupyter:      http://localhost:8888 (no auth)
#   MinIO S3 API: http://localhost:9000 (minioadmin/minioadmin)
#   MinIO Console: http://localhost:9001 (minioadmin/minioadmin)
#   Neo4j Browser: http://localhost:7474 (neo4j/localpassword)
#   Neo4j Bolt:    bolt://localhost:7687
#   Valkey/Redis:  redis://localhost:6379
#   PostgreSQL:    postgresql://localhost:5432 (scheduler/localpassword)
#   Flower:        http://localhost:5555

networks:
  jupyter-dev:
    driver: bridge

services:
  # JupyterLab - Python runtime for execution and demos
  # Access: http://localhost:8888
  jupyterlab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jupyter.dev.local
    hostname: jupyter.dev.local
    networks:
      jupyter-dev:
        aliases:
          - jupyter.dev.local
    volumes:
      - .:/home/jovyan/workspaces
      - ~/downloads/ytdlp:/home/jovyan/downloads/ytdlp
      - ~/assets:/home/jovyan/assets:ro
      - ~/assets/output:/home/jovyan/assets/output
    ports:
      - "8888:8888"
      - "8000:8000"
      - "8001:8001"
    depends_on:
      valkey:
        condition: service_healthy
      minio:
        condition: service_healthy
      neo4j:
        condition: service_started
    environment:
      # Disable token auth for local dev - access directly at jupyter.dev.local:8888
      - JUPYTER_TOKEN=
      - JUPYTER_DISABLE_CHECK=yes
      # Service endpoints using dev.local hostnames
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-localpassword}
      - REDIS_URL=redis://valkey:6379
      - VALKEY_HOST=valkey
      - VALKEY_PORT=6379
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids: ['nvidia.com/gpu=all']
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8888/api || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # MinIO - S3-compatible object storage
  # Console: http://localhost:9001
  # API: http://localhost:9000
  minio:
    image: minio/minio:latest
    container_name: s3.jupyter.dev.local
    hostname: s3.jupyter.dev.local
    networks:
      jupyter-dev:
        aliases:
          - s3.jupyter.dev.local
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    environment:
      - MINIO_ROOT_USER=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_SECRET_KEY:-minioadmin}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 15s
      timeout: 10s
      retries: 3

  # Neo4j - Knowledge graph and ontology storage
  # Browser: http://localhost:7474
  # Bolt: bolt://localhost:7687
  neo4j:
    image: neo4j:latest
    container_name: n4j.jupyter.dev.local
    hostname: n4j.jupyter.dev.local
    networks:
      jupyter-dev:
        aliases:
          - n4j.jupyter.dev.local
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-localpassword}
      - NEO4J_ACCEPT_LICENSE_AGREEMENT=yes
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
      - NEO4J_dbms_security_procedures_allowlist=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:7474 || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s

  # Valkey - Redis-compatible cache for indexing
  # Access: redis://localhost:6379
  valkey:
    image: valkey/valkey:7.2
    container_name: cache.jupyter.dev.local
    hostname: cache.jupyter.dev.local
    networks:
      jupyter-dev:
        aliases:
          - cache.jupyter.dev.local
    ports:
      - "6379:6379"
    volumes:
      - valkey_data:/data
    command: valkey-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  # PostgreSQL - Task scheduler database
  # Access: postgresql://localhost:5432
  postgres:
    image: postgres:16-alpine
    container_name: postgres.jupyter.dev.local
    hostname: postgres.jupyter.dev.local
    networks:
      jupyter-dev:
        aliases:
          - postgres.jupyter.dev.local
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=feed_scheduler
      - POSTGRES_USER=${POSTGRES_USER:-scheduler}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-localpassword}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./src/feed/storage/migrations/postgres:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scheduler -d feed_scheduler"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # FlareSolverr - Cloudflare bypass for web scraping
  # Access: http://localhost:8191
  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr.jupyter.dev.local
    hostname: flaresolverr.jupyter.dev.local
    networks:
      jupyter-dev:
        aliases:
          - flaresolverr.jupyter.dev.local
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - LOG_HTML=${LOG_HTML:-false}
      - CAPTCHA_SOLVER=${CAPTCHA_SOLVER:-none}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8191/v1"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  # Celery Worker - Task execution engine
  celery-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery-worker.dev.local
    hostname: celery-worker.dev.local
    command: celery -A src.feed.scheduler.celery_app worker --loglevel=info --concurrency=4
    networks:
      - jupyter-dev
    volumes:
      - .:/home/jovyan/workspaces
      - /nix/store:/nix/store:ro
    depends_on:
      valkey:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - PYTHONPATH=/home/jovyan/workspaces
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://valkey:6379/1
      - POSTGRES_URL=postgresql://scheduler:localpassword@postgres:5432/feed_scheduler
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=${NEO4J_USER:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-localpassword}
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "celery -A src.feed.scheduler.celery_app inspect ping -d celery@celery-worker.dev.local"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  # Celery Beat - Task scheduler
  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: celery-beat.dev.local
    hostname: celery-beat.dev.local
    command: celery -A src.feed.scheduler.celery_app beat --scheduler redbeat.RedBeatScheduler --loglevel=info
    networks:
      - jupyter-dev
    volumes:
      - .:/home/jovyan/workspaces
    depends_on:
      valkey:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - PYTHONPATH=/home/jovyan/workspaces
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://valkey:6379/1
      - POSTGRES_URL=postgresql://scheduler:localpassword@postgres:5432/feed_scheduler
    env_file:
      - .env
    restart: unless-stopped

  # Flower - Celery monitoring UI
  # Access: http://localhost:5555
  flower:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: flower.dev.local
    hostname: flower.dev.local
    command: celery -A src.feed.scheduler.celery_app flower --port=5555
    networks:
      - jupyter-dev
    ports:
      - "5555:5555"
    depends_on:
      - valkey
      - celery-worker
    volumes:
      - .:/home/jovyan/workspaces
    environment:
      - PYTHONPATH=/home/jovyan/workspaces
      - CELERY_BROKER_URL=redis://valkey:6379/0
      - CELERY_RESULT_BACKEND=redis://valkey:6379/1
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5555"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Optional: vLLM for GPU inference workloads
  vllm:
    profiles: ["vllm"]
    build:
      context: .
      dockerfile: Dockerfile.vllm
    networks:
      - jupyter-dev
    environment:
      - CUDA_VISIBLE_DEVICES=0
    deploy:
      resources:
        reservations:
          devices:
            - driver: cdi
              device_ids: ['nvidia.com/gpu=all']
              capabilities: [gpu]

volumes:
  valkey_data: {}
  minio_data: {}
  neo4j_data: {}
  neo4j_logs: {}
  neo4j_import: {}
  neo4j_plugins: {}
  postgres_data: {}
