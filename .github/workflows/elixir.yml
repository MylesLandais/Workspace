name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Elixir
      uses: erlef/setup-elixir@v1
      with:
        elixir-version: 1.18.4
        otp-version: 27.2.2

    - name: Set up system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg python3-pip
        python3 -m pip install -U yt-dlp

    - name: Create ENV for CI
      run: |
        echo "DISCORD_TOKEN=placeholder_token" >> .env
        echo "GUILD_ID=000000000000000000" >> .env
      # Add any other required env vars here

    - name: Get deps and compile
      run: |
        mix deps.get
        mix compile --warnings-as-errors

    - name: Run tests (if present)
      run: |
        mix test || echo "No tests found."

    - name: Build Docker image
      run: |
        # Ensure Dockerfile exists in repo root
        if [ ! -f Dockerfile ]; then echo "No Dockerfile!" && exit 1; fi
        docker build -t nebulixir:ci .
